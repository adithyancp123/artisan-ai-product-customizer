<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Artisan - AI Product Customization{% endblock %}</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- UI Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <style>
        h1, h2, h3, .navbar-brand { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body>
    <!-- Premium Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark nav-glass sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="/"><span class="text-gradient">ARTISAN</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fa-solid fa-house me-1"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/lab/"><i class="fa-solid fa-flask me-1"></i> Design Lab</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Premium Footer -->
    <footer class="footer mt-auto">
        <div class="container text-center text-secondary">
            <div class="row g-4 align-items-center">
                <div class="col-md-4 text-start">
                    <h5 class="text-light fw-bold mb-3">ARTISAN</h5>
                    <p class="small">Next-gen high-performance product customization powered by OpenCV and Celery.</p>
                </div>
                <div class="col-md-4">
                    <h6 class="text-light mb-3">Powered By</h6>
                    <div class="d-flex justify-content-center gap-4 fs-3">
                        <i class="fa-brands fa-python" title="Python 3.12"></i>
                        <i class="fa-solid fa-bolt" title="FastAPI/DRF"></i>
                        <i class="fa-solid fa-cogs" title="OpenCV"></i>
                        <i class="fa-solid fa-layer-group" title="Redis/Celery"></i>
                    </div>
                </div>
                <div class="col-md-4 text-end">
                    <p class="small mb-0 text-uppercase tracking-wider">Internship Assignment Submission</p>
                    <p class="small">&copy; 2026 Artisan AI</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
